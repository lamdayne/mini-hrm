<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mật khẩu tạm thời</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f7f6f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.06);
            padding: 28px 28px 24px;
            width: 100%;
            max-width: 420px;
        }

        .label {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.9px;
            text-transform: uppercase;
            color: #9b9890;
            margin-bottom: 12px;
        }

        .password-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f4f3ef;
            border: 1px solid rgba(0,0,0,0.10);
            border-radius: 10px;
            padding: 12px 14px;
            cursor: text;
            transition: border-color 0.15s, background 0.15s;
        }

        .password-box:hover {
            border-color: rgba(0,0,0,0.22);
            background: #eceae5;
        }

        .password-text {
            font-family: 'DM Mono', monospace;
            font-size: 15.5px;
            font-weight: 500;
            color: #1a1917;
            flex: 1;
            letter-spacing: 0.3px;
            word-break: break-all;
            user-select: text;
            cursor: text;
        }

        .copy-btn {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .copy-btn:hover {
            background: #1a1917;
            border-color: #1a1917;
        }

        .copy-btn:hover svg { stroke: #ffffff; }

        .copy-btn svg {
            width: 14px;
            height: 14px;
            stroke: #9b9890;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.15s;
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #b0ada8;
            margin-top: 10px;
            font-weight: 400;
        }

        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #1a1917;
            color: #fff;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 7px;
            opacity: 0;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .toast svg { width: 14px; height: 14px; stroke: #7ee8a2; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

<div class="card">
    <div class="label">Mật khẩu đã tạo</div>
    <div class="password-box">
        <span class="password-text" id="pwText" th:text="${password}">YzgwJGsZ8%^&amp;yGkU</span>
    </div>
</div>

</body>
</html>
